<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<title>掃描</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&family=Noto+Sans+TC:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F2F7FF;
  --surf:#ffffff;
  --surf2:#EAF2FE;
  --surf3:#D7E4F7;
  --main:#3A8DFF;
  --main-deep:#1E6FE6;
  --accent-light:#7AB7FF;
  --accent-soft:#A8E0FF;
  --yellow:#FFE89A;
  --yellow-deep:#FFD466;
  --pink:#FFB5D8;
  --green:#7BE3B4;
  --danger:#FF6B8A;
  --ink:#0E2547;
  --ink2:#5A7194;
  --ink3:#A8B6CC;
  --line:rgba(14,37,71,.08);
  --r:22px;
  --r-sm:14px;
  --tab-h:78px;
}
html,body{height:100%;background:var(--bg);color:var(--ink);
  font-family:'Plus Jakarta Sans','Noto Sans TC','SF Pro Rounded',-apple-system,system-ui,sans-serif;
  overflow:hidden;touch-action:manipulation;-webkit-tap-highlight-color:transparent;
  -webkit-font-smoothing:antialiased}

/* ─── Aurora background ─── */
.aurora{position:fixed;inset:0;overflow:hidden;pointer-events:none;z-index:0}
.aurora::before,.aurora::after,.aurora i{position:absolute;border-radius:50%;filter:blur(80px);content:""}
.aurora::before{width:380px;height:380px;background:var(--main);opacity:.22;top:-100px;left:-80px}
.aurora::after{width:340px;height:340px;background:var(--accent-light);opacity:.32;top:240px;right:-100px}
.aurora i{width:280px;height:280px;background:var(--accent-soft);opacity:.38;bottom:80px;left:-60px;display:block}
.aurora .sun{width:200px;height:200px;background:var(--yellow);opacity:.22;top:50%;left:50%;transform:translate(-50%,40px);filter:blur(70px)}

.screen{position:fixed;inset:0;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 16px);
  display:none;flex-direction:column;z-index:1}
.screen.active{display:flex}
#cameraScreen,#editorScreen{bottom:0;z-index:5}

/* ─── Floating glass tab bar ─── */
#tabBar{position:fixed;
  bottom:calc(env(safe-area-inset-bottom) + 16px);
  left:16px;right:16px;
  height:72px;border-radius:28px;
  background:rgba(255,255,255,.72);
  backdrop-filter:blur(20px) saturate(180%);
  -webkit-backdrop-filter:blur(20px) saturate(180%);
  border:1.5px solid rgba(255,255,255,.95);
  box-shadow:0 10px 30px rgba(14,37,71,.12), 0 2px 6px rgba(14,37,71,.05);
  display:grid;grid-template-columns:repeat(3,1fr);
  padding:0 8px;z-index:200;}
#tabBar.hidden{display:none}
.tab-btn{border:none;background:none;color:var(--ink2);font-size:10px;font-weight:700;
  cursor:pointer;display:flex;flex-direction:column;align-items:center;justify-content:center;
  gap:4px;transition:all .18s;position:relative;font-family:inherit;letter-spacing:.02em}
.tab-icon{width:38px;height:38px;border-radius:14px;display:flex;align-items:center;justify-content:center;transition:all .2s}
.tab-btn svg{width:18px;height:18px}
.tab-btn.active{color:var(--ink)}
.tab-btn.active .tab-icon{background:var(--main-deep);color:#fff;box-shadow:0 6px 14px rgba(58,141,255,.45)}
.tab-badge{position:absolute;top:6px;right:calc(50% - 22px);min-width:18px;height:18px;
  background:var(--danger);border-radius:9px;font-size:11px;font-weight:700;
  color:#fff;display:none;align-items:center;justify-content:center;padding:0 5px;
  box-shadow:0 2px 6px rgba(255,107,138,.5)}
.tab-badge.show{display:flex}

/* ─── Nav bar ─── */
.nav-bar{display:flex;align-items:flex-end;justify-content:space-between;
  padding:18px 24px 14px;padding-top:max(18px,calc(env(safe-area-inset-top) + 8px));
  flex-shrink:0;position:relative;z-index:2}
.nav-title-wrap{display:flex;flex-direction:column;gap:2px}
.nav-greet{font-size:12px;color:var(--ink2);font-weight:500}
.nav-title{font-size:26px;font-weight:800;letter-spacing:-.02em;line-height:1.1}
.nav-title em{color:var(--main-deep);font-style:normal}
.nav-sub{font-size:12px;color:var(--ink2);background:rgba(255,255,255,.7);
  backdrop-filter:blur(12px);padding:6px 12px;border-radius:999px;font-weight:600;
  border:1px solid rgba(255,255,255,.9);display:inline-flex;align-items:center;gap:6px}
.nav-sub::before{content:"";width:6px;height:6px;border-radius:50%;background:var(--green)}
.ver-badge{font-size:10px;color:var(--ink3);margin-left:6px;opacity:.7;font-family:ui-monospace,monospace}

/* ─── Scroll & grid ─── */
.page-scroll{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:6px 20px 28px;position:relative;z-index:2}
.photo-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:14px}
@media(min-width:680px){.photo-grid{grid-template-columns:repeat(3,1fr)}}
@media(min-width:1024px){.photo-grid{grid-template-columns:repeat(4,1fr)}}

.photo-card{position:relative;aspect-ratio:3/4;border-radius:22px;overflow:hidden;
  background:linear-gradient(135deg, var(--accent-soft), var(--accent-light));
  cursor:pointer;transition:transform .15s, box-shadow .2s;
  box-shadow:0 8px 24px rgba(58,141,255,.18), 0 2px 6px rgba(58,141,255,.1)}
.photo-card:active{transform:scale(.97)}
.photo-card img{width:100%;height:100%;object-fit:cover;display:block}
.photo-card .src-badge{position:absolute;top:10px;left:10px;
  background:rgba(255,255,255,.85);color:var(--ink);
  font-size:10px;font-weight:700;padding:3px 9px;border-radius:999px;
  backdrop-filter:blur(8px);letter-spacing:.02em}
.photo-card .num-badge{position:absolute;top:10px;left:10px;
  width:28px;height:28px;border-radius:50%;
  background:rgba(255,255,255,.85);color:var(--ink);
  font-size:13px;font-weight:700;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(8px);box-shadow:0 2px 6px rgba(0,0,0,.08)}
.photo-card .del-btn{position:absolute;top:10px;right:10px;width:26px;height:26px;border-radius:50%;
  background:rgba(14,37,71,.55);border:none;color:#fff;font-size:12px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);font-weight:700}
.photo-card .save-btn{position:absolute;bottom:10px;right:10px;width:36px;height:36px;border-radius:50%;
  background:var(--main-deep);border:none;color:#fff;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 14px rgba(58,141,255,.45)}
.photo-card .save-btn:active{transform:scale(.92)}

.add-card{aspect-ratio:3/4;border-radius:22px;
  border:2px dashed rgba(58,141,255,.3);
  background:rgba(255,255,255,.5);backdrop-filter:blur(10px);
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;gap:10px;cursor:pointer;color:var(--main-deep);font-size:13px;font-weight:600}
.add-card:active{background:rgba(255,255,255,.75);transform:scale(.97)}
.add-card .plus{width:44px;height:44px;border-radius:50%;background:var(--main);color:#fff;
  display:flex;align-items:center;justify-content:center;
  box-shadow:0 6px 14px rgba(58,141,255,.4);font-size:24px;font-weight:300}

.empty-state{display:none;flex-direction:column;align-items:center;justify-content:center;
  gap:16px;padding:60px 32px;text-align:center;color:var(--ink2)}
.empty-state.show{display:flex}
.empty-state-icon{width:96px;height:96px;border-radius:32px;
  background:linear-gradient(135deg, var(--accent-soft), var(--main));
  display:flex;align-items:center;justify-content:center;color:#fff;
  box-shadow:0 10px 30px rgba(58,141,255,.3)}
.empty-state p{font-size:14px;line-height:1.6;font-weight:500}

/* ─── FAB ─── */
.fab{position:fixed;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 28px);
  left:50%;transform:translateX(-50%);
  background:linear-gradient(135deg, var(--main) 0%, var(--accent-light) 100%);
  color:#fff;border:none;border-radius:999px;
  padding:14px 26px;font-size:15px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;gap:9px;white-space:nowrap;
  font-family:inherit;letter-spacing:.01em;z-index:150;
  box-shadow:0 12px 28px rgba(58,141,255,.5), 0 2px 6px rgba(58,141,255,.3)}
.fab:active{opacity:.92;transform:translateX(-50%) scale(.96)}
.fab:disabled{background:var(--surf3);color:var(--ink3);box-shadow:none;cursor:not-allowed}

/* ─── Camera ─── */
#cameraScreen{background:#000}
#cameraVideo{flex:1;width:100%;object-fit:cover}
#faceOverlay{position:absolute;top:0;left:0;width:100%;height:100%;pointer-events:none}
.camera-bar{position:absolute;bottom:0;left:0;right:0;padding:20px;
  padding-bottom:max(28px,env(safe-area-inset-bottom));
  display:flex;align-items:center;justify-content:space-between;
  background:linear-gradient(transparent,rgba(0,0,0,.72))}
.shutter{width:78px;height:78px;border-radius:50%;border:4px solid #fff;
  background:rgba(255,255,255,.22);cursor:pointer;
  display:flex;align-items:center;justify-content:center;-webkit-appearance:none;
  box-shadow:0 0 0 4px rgba(58,141,255,.4)}
.shutter:active .shutter-inner{transform:scale(.85)}
.shutter-inner{width:58px;height:58px;border-radius:50%;background:#fff;transition:transform .1s}
.cam-btn{width:48px;height:48px;border-radius:50%;border:none;background:rgba(255,255,255,.2);
  color:#fff;cursor:pointer;display:flex;align-items:center;justify-content:center;
  backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.15)}
.cam-count{position:absolute;top:max(14px,env(safe-area-inset-top));left:50%;transform:translateX(-50%);
  background:rgba(255,255,255,.18);color:#fff;padding:6px 14px;border-radius:999px;
  font-size:13px;font-weight:700;backdrop-filter:blur(12px);
  border:1px solid rgba(255,255,255,.2)}


/* ─── Editor ─── */
#editorScreen{background:var(--bg)}
.editor-top{display:flex;align-items:center;gap:8px;padding:12px 16px;
  padding-top:max(12px,calc(env(safe-area-inset-top) + 6px));
  flex-shrink:0;position:relative;z-index:3}
.back-btn{border:none;background:rgba(255,255,255,.8);color:var(--ink);
  font-size:14px;font-weight:600;cursor:pointer;
  padding:8px 14px;border-radius:999px;
  display:flex;align-items:center;gap:6px;white-space:nowrap;
  backdrop-filter:blur(12px);border:1px solid rgba(255,255,255,.9);
  box-shadow:0 4px 10px rgba(14,37,71,.08);font-family:inherit}
.editor-title{flex:1;text-align:center;font-size:15px;font-weight:700;color:var(--ink)}

.canvas-wrap{flex:1;position:relative;overflow:hidden;
  margin:14px 18px;border-radius:24px;
  background:#1a1a2e;
  box-shadow:0 10px 30px rgba(14,37,71,.25);
  display:flex;align-items:center;justify-content:center;z-index:2}
#editorCanvas{position:absolute;top:0;left:0;touch-action:none}

.editor-bar{margin:0 18px 16px;padding:10px;border-radius:24px;
  background:rgba(255,255,255,.8);backdrop-filter:blur(20px);
  -webkit-backdrop-filter:blur(20px);
  border:1.5px solid rgba(255,255,255,.95);
  box-shadow:0 10px 30px rgba(14,37,71,.12);
  padding-bottom:max(10px,calc(env(safe-area-inset-bottom) + 2px));
  flex-shrink:0;position:relative;z-index:3}
.tool-row{display:flex;align-items:center;gap:6px;margin-bottom:8px}
.tool-row:last-child{margin-bottom:0}

.tool-btn{flex:1;height:42px;border-radius:14px;border:none;
  background:rgba(58,141,255,.08);color:var(--ink);
  font-size:13px;font-weight:700;cursor:pointer;
  display:flex;align-items:center;justify-content:center;gap:5px;transition:all .15s;
  min-width:0;padding:0 4px;font-family:inherit}
.tool-btn.active{background:linear-gradient(135deg, var(--main), var(--accent-light));
  color:#fff;box-shadow:0 4px 12px rgba(58,141,255,.4)}
.tool-btn:active{opacity:.85;transform:scale(.97)}
.tool-btn svg{flex-shrink:0}
.icon-btn{width:42px;height:42px;border-radius:14px;border:none;
  background:rgba(58,141,255,.08);color:var(--ink);font-size:15px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .15s}
.icon-btn:active{opacity:.85;transform:scale(.93)}
.icon-btn.rotate:active{background:var(--yellow-deep);color:var(--ink)}
.icon-btn.undo{background:rgba(255,107,138,.12);color:var(--danger)}
.icon-btn.undo:active{background:var(--danger);color:#fff}

.color-wrap{position:relative;width:42px;height:42px;flex-shrink:0}
.color-wrap input[type=color]{position:absolute;inset:0;opacity:0;width:100%;height:100%;cursor:pointer;border:none;padding:0}
.color-swatch{width:42px;height:42px;border-radius:14px;
  border:3px solid #fff;pointer-events:none;
  box-shadow:0 0 0 1.5px var(--main-deep), 0 4px 10px rgba(14,37,71,.12)}
.size-slider{flex:1;height:4px;-webkit-appearance:none;appearance:none;
  background:rgba(58,141,255,.15);border-radius:99px;outline:none;cursor:pointer;margin:0 6px}
.size-slider::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;
  border-radius:50%;background:#fff;border:2.5px solid var(--main-deep);
  box-shadow:0 2px 6px rgba(58,141,255,.4)}
.size-label{font-size:12px;color:var(--ink2);flex-shrink:0;width:30px;text-align:right;font-weight:700;font-variant-numeric:tabular-nums}

#cropRow,#perspRow{display:none}
.confirm-hint{font-size:12px;color:var(--ink2);text-align:center;padding:4px 0 8px;line-height:1.55;font-weight:500}
.confirm-btn-row{display:flex;gap:8px}
.btn-ok{flex:1;height:42px;border-radius:14px;border:none;
  background:var(--main-deep);color:#fff;
  font-size:14px;font-weight:700;cursor:pointer;font-family:inherit;
  box-shadow:0 6px 14px rgba(58,141,255,.4)}
.btn-cancel{flex:1;height:42px;border-radius:14px;border:none;
  background:rgba(58,141,255,.08);color:var(--ink);
  font-size:14px;font-weight:600;cursor:pointer;font-family:inherit}
.btn-ok:active,.btn-cancel:active{opacity:.85;transform:scale(.98)}

/* ─── Export ─── */
.export-header{padding:8px 24px 16px;display:flex;align-items:center;justify-content:space-between;
  flex-shrink:0;position:relative;z-index:2}
.export-count{font-size:15px;font-weight:700;color:var(--ink)}
.export-count span{color:var(--ink2);font-weight:500;font-size:12px;display:block;margin-top:2px}
.export-all-btn{border:none;background:linear-gradient(135deg, var(--main), var(--accent-light));
  color:#fff;font-size:14px;font-weight:700;padding:11px 18px;border-radius:999px;
  cursor:pointer;display:flex;align-items:center;gap:7px;font-family:inherit;
  box-shadow:0 8px 18px rgba(58,141,255,.4)}
.export-all-btn:active{transform:scale(.96)}
.export-all-btn:disabled{background:var(--surf3);color:var(--ink3);box-shadow:none;cursor:not-allowed}

/* ─── Import workflow ─── */
.workflow-card{background:rgba(255,255,255,.8);backdrop-filter:blur(20px);
  border-radius:24px;margin:0 0 14px;overflow:hidden;
  border:1.5px solid rgba(255,255,255,.95);
  box-shadow:0 8px 24px rgba(14,37,71,.08)}
.workflow-step{display:flex;gap:14px;align-items:flex-start;padding:18px}
.workflow-step+.workflow-step{border-top:1px solid var(--line)}
.step-num{width:32px;height:32px;border-radius:50%;
  background:linear-gradient(135deg, var(--main), var(--accent-light));color:#fff;
  font-size:14px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0;
  box-shadow:0 4px 10px rgba(58,141,255,.4);font-family:inherit}
.step-body{flex:1;min-width:0}
.step-title{font-size:15px;font-weight:700;margin-bottom:5px;color:var(--ink)}
.step-desc{font-size:13px;color:var(--ink2);line-height:1.55;margin-bottom:10px;font-weight:500}
.step-desc:last-child{margin-bottom:0}
.step-url{font-size:11px;color:var(--ink2);word-break:break-all;margin-bottom:10px;
  background:rgba(58,141,255,.08);padding:7px 11px;border-radius:10px;
  font-family:ui-monospace,SF Mono,monospace;font-weight:500}
.step-btn{display:inline-flex;align-items:center;gap:7px;border:none;border-radius:999px;
  padding:10px 18px;font-size:13px;font-weight:700;cursor:pointer;transition:all .15s;font-family:inherit}
.step-btn:active{opacity:.85;transform:scale(.97)}
.step-btn.primary{background:var(--main-deep);color:#fff;box-shadow:0 6px 14px rgba(58,141,255,.4)}
.kbd{display:inline-block;background:#fff;border:1px solid var(--line);
  border-radius:8px;padding:2px 8px;
  font-size:11px;font-weight:700;color:var(--ink);letter-spacing:.03em;
  box-shadow:0 1px 0 rgba(14,37,71,.05);font-family:inherit}

/* ─── Loading ─── */
#loadingOverlay{position:fixed;inset:0;background:rgba(14,37,71,.4);
  display:none;align-items:center;justify-content:center;z-index:9000;backdrop-filter:blur(6px)}
#loadingOverlay.show{display:flex}
.loading-box{background:rgba(255,255,255,.95);border-radius:24px;padding:28px 36px;
  display:flex;flex-direction:column;align-items:center;gap:16px;
  box-shadow:0 20px 60px rgba(14,37,71,.25)}
.spinner{width:36px;height:36px;border:3px solid rgba(58,141,255,.15);
  border-top-color:var(--main-deep);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-box p{font-size:14px;color:var(--ink);font-weight:600}

/* ─── Toast ─── */
.toast{position:fixed;bottom:calc(var(--tab-h) + env(safe-area-inset-bottom) + 28px);
  left:50%;transform:translateX(-50%) translateY(10px);
  background:rgba(14,37,71,.95);color:#fff;padding:12px 22px;border-radius:999px;
  font-size:14px;font-weight:600;opacity:0;transition:all .25s;pointer-events:none;
  white-space:nowrap;backdrop-filter:blur(14px);z-index:9999;max-width:90vw;text-align:center;
  font-family:inherit;box-shadow:0 10px 30px rgba(14,37,71,.3)}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.top{bottom:auto;top:max(calc(env(safe-area-inset-top) + 56px),76px)}

#fileInput,#importInput{display:none}
button{-webkit-appearance:none;font-family:inherit}
.page-scroll::-webkit-scrollbar{width:0}
</style>
</head>
<body>

<div class="aurora"><i></i><div class="sun"></div></div>

<!-- ══ Tab 1: 截圖 ══ -->
<div id="importScreen" class="screen active">
  <div class="nav-bar">
    <div class="nav-title-wrap">
      <div class="nav-greet">從網頁抓畫面</div>
      <div class="nav-title">網頁<em>截圖</em></div>
    </div>
    <span class="nav-sub" id="importCount">0 / 5<span class="ver-badge">v1.3</span></span>
  </div>
  <div class="page-scroll">
    <div class="workflow-card">
      <div class="workflow-step">
        <div class="step-num">1</div>
        <div class="step-body">
          <div class="step-title">開啟目標網站</div>
          <div class="step-url">https://www.eduwebportal.com/login.php</div>
          <button class="step-btn primary" onclick="openWebsite()">
            <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2">
              <circle cx="12" cy="12" r="10"/>
              <line x1="2" y1="12" x2="22" y2="12"/>
              <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
            </svg>
            在 Safari 開啟
          </button>
        </div>
      </div>
      <div class="workflow-step">
        <div class="step-num">2</div>
        <div class="step-body">
          <div class="step-title">截取畫面（最多 5 張）</div>
          <div class="step-desc">
            iPad：同時按 <span class="kbd">電源</span> + <span class="kbd">音量＋</span><br>
            截圖會自動存入「照片」App
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ══ Tab 2: 掃描 ══ -->
<div id="scanScreen" class="screen">
  <div class="nav-bar">
    <div class="nav-title-wrap">
      <div class="nav-greet" id="scanGreet">嗨 早安 ☀️</div>
      <div class="nav-title">掃描<em>照片</em></div>
    </div>
    <span class="nav-sub" id="scanCount">0 / 10</span>
  </div>
  <div class="page-scroll">
    <div class="photo-grid" id="scanGrid"></div>
    <div class="empty-state" id="scanEmpty">
      <div class="empty-state-icon">
        <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">

<script>
// ═══════════════════════════════════════════════
//  PERSPECTIVE TRANSFORM MATH
// ═══════════════════════════════════════════════
function dist(a, b) { return Math.hypot(b.x - a.x, b.y - a.y); }

function gaussSolve(A, b) {
  const n = b.length;
  const M = A.map((row, i) => [...row, b[i]]);
  for (let c = 0; c < n; c++) {
    let pivotRow = c;
    for (let r = c + 1; r < n; r++)
      if (Math.abs(M[r][c]) > Math.abs(M[pivotRow][c])) pivotRow = r;
    [M[c], M[pivotRow]] = [M[pivotRow], M[c]];
    if (Math.abs(M[c][c]) < 1e-12) continue;
    for (let r = 0; r < n; r++) {
      if (r === c) continue;
      const f = M[r][c] / M[c][c];
      for (let k = c; k <= n; k++) M[r][k] -= f * M[c][k];
    }
  }
  return M.map((row, i) => row[n] / row[i]);
}

function computeH(srcPts, dstPts) {
  const A = [], b = [];
  for (let i = 0; i < 4; i++) {
    const sx = srcPts[i].x, sy = srcPts[i].y;
    const dx = dstPts[i].x, dy = dstPts[i].y;
    A.push([sx, sy, 1, 0,  0,  0, -sx*dx, -sy*dx]); b.push(dx);
    A.push([0,  0,  0, sx, sy, 1, -sx*dy, -sy*dy]); b.push(dy);
  }
  const h = gaussSolve(A, b);
  return [[h[0],h[1],h[2]], [h[3],h[4],h[5]], [h[6],h[7],1]];
}

function applyH(H, x, y) {
  const w = H[2][0]*x + H[2][1]*y + H[2][2];
  return { x: (H[0][0]*x + H[0][1]*y + H[0][2]) / w,
           y: (H[1][0]*x + H[1][1]*y + H[1][2]) / w };
}

function perspWarp(srcCanvas, quad) {
  const outW = Math.round((dist(quad[0], quad[1]) + dist(quad[3], quad[2])) / 2);
  const outH = Math.round((dist(quad[0], quad[3]) + dist(quad[1], quad[2])) / 2);
  if (outW < 4 || outH < 4) return null;
  const dstPts = [{x:0,y:0},{x:outW,y:0},{x:outW,y:outH},{x:0,y:outH}];
  const Hinv = computeH(dstPts, quad);
  const out = document.createElement('canvas');
  out.width = outW; out.height = outH;
  const oCtx = out.getContext('2d');
  const sCtx = srcCanvas.getContext('2d');
  const sd = sCtx.getImageData(0, 0, srcCanvas.width, srcCanvas.height).data;
  const od = oCtx.createImageData(outW, outH);
  const od8 = od.data;
  const sw = srcCanvas.width, sh = srcCanvas.height;
  for (let oy = 0; oy < outH; oy++) {
    for (let ox = 0; ox < outW; ox++) {
      const sp = applyH(Hinv, ox, oy);
      const sx = sp.x, sy = sp.y;
      if (sx < 0 || sx >= sw - 0.5 || sy < 0 || sy >= sh - 0.5) continue;
      const x0 = sx | 0, y0 = sy | 0;
      const x1 = Math.min(x0 + 1, sw - 1), y1 = Math.min(y0 + 1, sh - 1);
      const fx = sx - x0, fy = sy - y0, fx1 = 1 - fx, fy1 = 1 - fy;
      const i00 = (y0*sw + x0)*4, i10 = (y0*sw + x1)*4;
      const i01 = (y1*sw + x0)*4, i11 = (y1*sw + x1)*4;
      const oi  = (oy*outW + ox)*4;
      od8[oi]   = sd[i00]  *fx1*fy1 + sd[i10]  *fx*fy1 + sd[i01]  *fx1*fy + sd[i11]  *fx*fy;
      od8[oi+1] = sd[i00+1]*fx1*fy1 + sd[i10+1]*fx*fy1 + sd[i01+1]*fx1*fy + sd[i11+1]*fx*fy;
      od8[oi+2] = sd[i00+2]*fx1*fy1 + sd[i10+2]*fx*fy1 + sd[i01+2]*fx1*fy + sd[i11+2]*fx*fy;
      od8[oi+3] = 255;
    }
  }
  oCtx.putImageData(od, 0, 0);
  return out;
}

// ═══════════════════════════════════════════════
//  STATE
// ═══════════════════════════════════════════════
const MAX = 10;
const MAX_IMPORT = 5;
const TARGET_URL = 'https://www.eduwebportal.com/login.php';
const HANDLE_COLORS = ['#1E6FE6','#FFD466','#7BE3B4','#FFB5D8'];

const st = {
  scanned:  [],   // {url, faces[]}
  imported: [],
  editSrc:  null,
  editIdx:  -1,
  currentTab: 'import',
  tool: 'brush',
  colors: { brush: '#ffffff', blackout: '#ffffff' },
  brushSize: 8,
  history: [],
  isDrawing: false, lx:0, ly:0,
  boStart: null,
  cropStart: null, cropEnd: null,
  perspHandles: [],
  activeHandle: -1,
  stream: null, facing: 'environment',
};

// ═══════════════════════════════════════════════
//  GREETING
// ═══════════════════════════════════════════════
function setGreeting() {
  const h = new Date().getHours();
  let g = '嗨 早安 ☀️';
  if (h >= 5  && h < 11) g = '嗨 早安 ☀️';
  else if (h >= 11 && h < 14) g = '嗨 午安 🌤';
  else if (h >= 14 && h < 18) g = '嗨 下午好 ✨';
  else if (h >= 18 && h < 22) g = '嗨 晚安 🌙';
  else g = '嗨 夜深了 🌙';
  document.getElementById('scanGreet').textContent = g;
}

// ═══════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════
function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
  document.getElementById('tabBar').classList.toggle('hidden',
    id === 'cameraScreen' || id === 'editorScreen');
}

function switchTab(tab) {
  st.currentTab = tab;
  ['scan','import','export'].forEach(t =>
    document.getElementById('tab'+cap(t)).classList.toggle('active', t === tab));
  showScreen(tab + 'Screen');
  if (tab === 'export') renderExport();
  if (tab === 'scan')   renderScan();
}

function cap(s) { return s.charAt(0).toUpperCase() + s.slice(1); }

// ═══════════════════════════════════════════════
//  GALLERIES
// ═══════════════════════════════════════════════
function updateBadges() {
  setBadge('badgeScan',   st.scanned.length);
  setBadge('badgeExport', st.scanned.length);
}
function setBadge(id, n) {
  const el = document.getElementById(id);
  el.textContent = n || '';
  el.classList.toggle('show', n > 0);
}

function renderScan() {
  const grid  = document.getElementById('scanGrid');
  const empty = document.getElementById('scanEmpty');
  document.getElementById('scanCount').textContent = `${st.scanned.length} / ${MAX}`;
  document.getElementById('scanFab').disabled = st.scanned.length >= MAX;
  empty.classList.toggle('show', !st.scanned.length);
  grid.innerHTML = '';
  st.scanned.forEach((p, i) => grid.appendChild(makeCard(p.url, i, 'scan', false)));
  if (st.scanned.length < MAX) grid.appendChild(makeAddCard(openCamera));
  updateBadges();
}

function renderImport() {}

function renderExport() {
  const all  = st.scanned;
  const grid = document.getElementById('exportGrid');
  const empty= document.getElementById('exportEmpty');
  const btn  = document.getElementById('exportAllBtn');
  document.getElementById('exportCountLabel').textContent = `共 ${all.length} 張`;
  btn.disabled = !all.length;
  empty.classList.toggle('show', !all.length);
  grid.innerHTML = '';
  all.forEach((p, i) => {
    const card = makeCard(p.url, i, 'scan', false);
    const saveBtn = document.createElement('button');
    saveBtn.className = 'save-btn'; saveBtn.title = '儲存';
    saveBtn.innerHTML = `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
      <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
      <polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/>
    </svg>`;
    saveBtn.onclick = e => { e.stopPropagation(); saveOnePhoto(p.url, `scan_${i+1}.jpg`); };
    card.appendChild(saveBtn);
    grid.appendChild(card);
  });
  updateBadges();
}

function makeCard(url, idx, src, showSrcBadge) {
  const card = document.createElement('div');
  card.className = 'photo-card';
  card.innerHTML = `<img src="${url}" alt="">
    ${showSrcBadge ? `<span class="src-badge">${src==='scan'?'掃描':'匯入'}</span>` : `<span class="num-badge">${idx+1}</span>`}
    <button class="del-btn">✕</button>`;
  card.querySelector('.del-btn').onclick = e => {
    e.stopPropagation();
    (src === 'scan' ? st.scanned : st.imported).splice(idx, 1);
    if (src === 'scan')   renderScan();
    if (src === 'import') renderImport();
    if (st.currentTab === 'export') renderExport();
    updateBadges();
  };
  card.onclick = () => openEditor(src, idx);
  return card;
}

function makeAddCard(cb) {
  const c = document.createElement('div');
  c.className = 'add-card';
  c.innerHTML = `<div class="plus">+</div><span>加入照片</span>`;
  c.onclick = cb; return c;
}

// ═══════════════════════════════════════════════
//  CAMERA
// ═══════════════════════════════════════════════
async function openCamera() {
  if (st.scanned.length >= MAX) return;
  if (!navigator.mediaDevices?.getUserMedia) {
    document.getElementById('fileInput').click(); return;
  }
  try {
    st.stream = await navigator.mediaDevices.getUserMedia({
      video: { facingMode: st.facing, width:{ideal:3840}, height:{ideal:2160} }, audio: false
    });
    document.getElementById('cameraVideo').srcObject = st.stream;
    document.getElementById('camCount').textContent = `${st.scanned.length} / ${MAX}`;
    showScreen('cameraScreen');
  } catch { document.getElementById('fileInput').click(); }
}

function closeCamera() {
  stopStream(); switchTab('scan');
}
function stopStream() { st.stream?.getTracks().forEach(t => t.stop()); st.stream = null; }

async function flipCamera() {
  st.facing = st.facing === 'environment' ? 'user' : 'environment';
  stopStream();
  st.stream = await navigator.mediaDevices.getUserMedia({
    video:{facingMode:st.facing}, audio:false });
  document.getElementById('cameraVideo').srcObject = st.stream;
}

function capturePhoto() {
  if (st.scanned.length >= MAX) { closeCamera(); return; }
  const v = document.getElementById('cameraVideo');
  const c = document.createElement('canvas');
  c.width = v.videoWidth; c.height = v.videoHeight;
  c.getContext('2d').drawImage(v, 0, 0);
  st.scanned.push({ url: compressCanvas(c) });
  document.getElementById('camCount').textContent = `${st.scanned.length} / ${MAX}`;
  showToast(`已拍攝第 ${st.scanned.length} 張`);
  if (st.scanned.length >= MAX) closeCamera();
}

function handleCamera(input) {
  Array.from(input.files).slice(0, MAX - st.scanned.length).forEach(f => {
    const r = new FileReader();
    r.onload = e => { st.scanned.push({url:e.target.result}); renderScan(); };
    r.readAsDataURL(f);
  });
  input.value = '';
}

function handleImport(input) {
  const slots = MAX_IMPORT - st.imported.length;
  if (slots <= 0) { showToast('已達 5 張上限'); input.value = ''; return; }
  const files = Array.from(input.files).slice(0, slots);
  let loaded = 0;
  files.forEach(f => {
    const r = new FileReader();
    r.onload = e => {
      st.imported.push({ url: e.target.result });
      loaded++;
      if (loaded === files.length) showToast(`已匯入 ${files.length} 張`);
    };
    r.readAsDataURL(f);
  });
  input.value = '';
}

function openWebsite() {
  window.open(TARGET_URL, '_blank');
  showToast('已開啟網站，截圖後回來此 App 繼續操作');
}

// ═══════════════════════════════════════════════
//  EDITOR
// ═══════════════════════════════════════════════
const canvas = document.getElementById('editorCanvas');
const ctx    = canvas.getContext('2d');

function openEditor(src, idx) {
  st.editSrc = src; st.editIdx = idx;
  st.history = []; st.cropStart = st.cropEnd = null; st.perspHandles = [];
  document.getElementById('editorTitle').textContent =
    `${src==='scan'?'掃描':'匯入'} ${idx+1}`;
  showScreen('editorScreen');
  const arr = src === 'scan' ? st.scanned : st.imported;
  const img = new Image();
  img.onload = () => {
    requestAnimationFrame(() => {
      fitCanvas(img.width, img.height);
      ctx.drawImage(img, 0, 0, canvas.width, canvas.height);
      saveHist();
      setTool('brush');
    });
  };
  img.src = arr[idx].url;
}

function fitCanvas(imgW, imgH) {
  const wrap = document.getElementById('canvasWrap');
  const s = Math.min(wrap.clientWidth / imgW, wrap.clientHeight / imgH);
  canvas.width  = Math.round(imgW * s);
  canvas.height = Math.round(imgH * s);
  centerCanvas();
}

function centerCanvas() {
  const wrap = document.getElementById('canvasWrap');
  canvas.style.left = `${(wrap.clientWidth  - canvas.width)  / 2}px`;
  canvas.style.top  = `${(wrap.clientHeight - canvas.height) / 2}px`;
}

function closeEditor() {
  if (st.editSrc && st.editIdx >= 0) {
    if (st.tool === 'crop' || st.tool === 'persp') restoreLast();
    const arr = st.editSrc === 'scan' ? st.scanned : st.imported;
    arr[st.editIdx].url = compressCanvas(canvas);
  }
  st.editSrc = null; st.editIdx = -1;
  switchTab(st.currentTab);
}

// ─── Tools ───
function setTool(tool) {
  st.tool = tool; st.boStart = null;
  ['brush','blackout','crop','persp'].forEach(t =>
    document.getElementById('btn'+cap(t)).classList.toggle('active', t === tool));
  document.getElementById('optRow') .style.display = (tool==='brush'||tool==='blackout') ? 'flex' : 'none';
  document.getElementById('cropRow').style.display = tool === 'crop'  ? 'flex' : 'none';
  document.getElementById('perspRow').style.display= tool === 'persp' ? 'flex' : 'none';
  document.getElementById('sizeSlider').style.display = tool === 'brush' ? '' : 'none';
  document.getElementById('sizeLabel').style.display  = tool === 'brush' ? '' : 'none';
  if (tool === 'brush' || tool === 'blackout') {
    const col = st.colors[tool];
    document.getElementById('colorPicker').value = col;
    document.getElementById('colorSwatch').style.background = col;
  }
  if (tool === 'persp') {
    const cw = canvas.width, ch = canvas.height;
    const bw = Math.min(cw * 0.55, ch * 0.35);
    const bh = bw / 1.75;
    const cx = cw / 2, cy = ch / 2;
    st.perspHandles = [
      {x: cx - bw/2, y: cy - bh/2},
      {x: cx + bw/2, y: cy - bh/2},
      {x: cx + bw/2, y: cy + bh/2},
      {x: cx - bw/2, y: cy + bh/2},
    ];
    st.activeHandle = -1;
    drawPerspOverlay();
  } else if (tool !== 'crop') {
    restoreLast();
  }
}

function updateColor(v) {
  st.colors[st.tool] = v;
  document.getElementById('colorSwatch').style.background = v;
}
function updateSize(v) {
  st.brushSize = v;
  document.getElementById('sizeLabel').textContent = v;
}

function saveHist() {
  if (st.history.length > 40) st.history.shift();
  st.history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
}
function restoreLast() {
  if (st.history.length > 0)
    ctx.putImageData(st.history[st.history.length - 1], 0, 0);
}
function undo() {
  if (st.history.length <= 1) { showToast('沒有可復原的操作', true); return; }
  st.history.pop(); restoreLast();
  if (st.tool === 'persp') drawPerspOverlay();
}

function getPos(e) {
  const r = canvas.getBoundingClientRect();
  const s = e.touches ? e.touches[0] : e;
  return {
    x: (s.clientX - r.left) * (canvas.width  / r.width),
    y: (s.clientY - r.top)  * (canvas.height / r.height),
  };
}
function mkRect(a, b) {
  return {x:Math.min(a.x,b.x), y:Math.min(a.y,b.y), w:Math.abs(b.x-a.x), h:Math.abs(b.y-a.y)};
}

canvas.addEventListener('pointerdown', e => {
  e.preventDefault();
  canvas.setPointerCapture(e.pointerId);
  const p = getPos(e);
  if (st.tool === 'brush') {
    st.isDrawing = true; st.lx = p.x; st.ly = p.y;
    ctx.beginPath(); ctx.arc(p.x, p.y, st.brushSize/2, 0, Math.PI*2);
    ctx.fillStyle = st.colors.brush; ctx.fill();
  } else if (st.tool === 'blackout') {
    st.boStart = p;
  } else if (st.tool === 'crop') {
    st.cropStart = p; st.cropEnd = null;
  } else if (st.tool === 'persp') {
    st.activeHandle = closestHandle(p);
  }
}, {passive:false});

canvas.addEventListener('pointermove', e => {
  e.preventDefault();
  const p = getPos(e);
  if (st.tool === 'brush' && st.isDrawing) {
    ctx.beginPath(); ctx.moveTo(st.lx, st.ly); ctx.lineTo(p.x, p.y);
    ctx.strokeStyle = st.colors.brush; ctx.lineWidth = st.brushSize;
    ctx.lineCap = 'round'; ctx.lineJoin = 'round'; ctx.stroke();
    st.lx = p.x; st.ly = p.y;
  } else if (st.tool === 'blackout' && st.boStart) {
    restoreLast();
    const r = mkRect(st.boStart, p);
    ctx.fillStyle = st.colors.blackout; ctx.fillRect(r.x, r.y, r.w, r.h);
  } else if (st.tool === 'crop' && st.cropStart) {
    st.cropEnd = p; drawCropOverlay();
  } else if (st.tool === 'persp' && st.activeHandle >= 0) {
    st.perspHandles[st.activeHandle] = clampToCanvas(p);
    drawPerspOverlay();
  }
}, {passive:false});

canvas.addEventListener('pointerup', e => {
  e.preventDefault();
  const p = getPos(e);
  if (st.tool === 'brush' && st.isDrawing) {
    st.isDrawing = false; saveHist();
  } else if (st.tool === 'blackout' && st.boStart) {
    const r = mkRect(st.boStart, p);
    if (r.w > 3 && r.h > 3) {
      ctx.fillStyle = st.colors.blackout; ctx.fillRect(r.x, r.y, r.w, r.h); saveHist();
    }
    st.boStart = null;
  } else if (st.tool === 'crop' && st.cropStart) {
    st.cropEnd = p; drawCropOverlay();
  } else if (st.tool === 'persp') {
    st.activeHandle = -1;
  }
}, {passive:false});

canvas.addEventListener('pointerleave', () => {
  if (st.tool === 'brush' && st.isDrawing) { st.isDrawing = false; saveHist(); }
  if (st.tool === 'persp') st.activeHandle = -1;
});

function clampToCanvas(p) {
  return { x: Math.max(0, Math.min(canvas.width,  p.x)),
           y: Math.max(0, Math.min(canvas.height, p.y)) };
}

function drawCropOverlay() {
  if (!st.cropStart || !st.cropEnd) return;
  const r = mkRect(st.cropStart, st.cropEnd);
  restoreLast();
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, canvas.width, canvas.height);
  ctx.rect(r.x, r.y, r.w, r.h);
  ctx.fillStyle = 'rgba(14,37,71,.52)';
  ctx.fill('evenodd');
  ctx.strokeStyle = '#fff'; ctx.lineWidth = 1.5;
  ctx.setLineDash([6,3]); ctx.strokeRect(r.x+1, r.y+1, r.w-2, r.h-2); ctx.setLineDash([]);
  [[r.x,r.y],[r.x+r.w/2,r.y],[r.x+r.w,r.y],
   [r.x,r.y+r.h/2],[r.x+r.w,r.y+r.h/2],
   [r.x,r.y+r.h],[r.x+r.w/2,r.y+r.h],[r.x+r.w,r.y+r.h]]
  .forEach(([hx,hy]) => {
    ctx.fillStyle='#fff'; ctx.strokeStyle='#1E6FE6'; ctx.lineWidth=2;
    ctx.fillRect(hx-5, hy-5, 10, 10); ctx.strokeRect(hx-5, hy-5, 10, 10);
  });
  ctx.font = 'bold 12px "Plus Jakarta Sans",sans-serif';
  ctx.fillStyle = 'rgba(14,37,71,.85)'; ctx.fillRect(r.x+r.w/2-36, r.y+r.h/2-11, 72, 22);
  ctx.fillStyle = '#fff'; ctx.textAlign = 'center';
  ctx.fillText(`${Math.round(r.w)} × ${Math.round(r.h)}`, r.x+r.w/2, r.y+r.h/2+4);
  ctx.restore();
}

function confirmCrop() {
  if (!st.cropStart || !st.cropEnd) { showToast('請先拖拉選擇裁切範圍', true); return; }
  const r = mkRect(st.cropStart, st.cropEnd);
  if (r.w < 10 || r.h < 10) { showToast('裁切區域太小', true); return; }
  const clean = st.history[st.history.length - 1];
  const tmp = document.createElement('canvas');
  tmp.width = r.w; tmp.height = r.h;
  tmp.getContext('2d').putImageData(clean, -r.x, -r.y);
  canvas.width = r.w; canvas.height = r.h;
  ctx.drawImage(tmp, 0, 0);
  centerCanvas();
  st.history = []; saveHist();
  st.cropStart = st.cropEnd = null;
  setTool('brush'); showToast('裁切完成', true);
}

function closestHandle(pos) {
  let minD = Infinity, minI = -1;
  st.perspHandles.forEach((p, i) => {
    const d = Math.hypot(pos.x - p.x, pos.y - p.y);
    if (d < minD) { minD = d; minI = i; }
  });
  return minD < 50 ? minI : -1;
}

function drawPerspOverlay() {
  restoreLast();
  const pts = st.perspHandles;
  if (pts.length < 4) return;
  ctx.save();
  ctx.beginPath();
  ctx.rect(0, 0, canvas.width, canvas.height);
  ctx.moveTo(pts[0].x, pts[0].y);
  ctx.lineTo(pts[1].x, pts[1].y);
  ctx.lineTo(pts[2].x, pts[2].y);
  ctx.lineTo(pts[3].x, pts[3].y);
  ctx.closePath();
  ctx.fillStyle = 'rgba(14,37,71,.5)';
  ctx.fill('evenodd');
  ctx.beginPath();
  ctx.moveTo(pts[0].x, pts[0].y);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.closePath();
  ctx.strokeStyle = 'rgba(255,255,255,.9)';
  ctx.lineWidth = 1.5;
  ctx.stroke();
  pts.forEach((p, i) => {
    const active = i === st.activeHandle;
    ctx.beginPath();
    ctx.arc(p.x, p.y, active ? 22 : 18, 0, Math.PI*2);
    ctx.fillStyle = active ? '#fff' : HANDLE_COLORS[i];
    ctx.fill();
    ctx.strokeStyle = '#fff';
    ctx.lineWidth = active ? 3 : 2.5;
    ctx.stroke();
    ctx.fillStyle = active ? HANDLE_COLORS[i] : '#fff';
    ctx.font = 'bold 13px "Plus Jakarta Sans",sans-serif';
    ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
    ctx.fillText(i + 1, p.x, p.y);
  });
  ctx.restore();
}

async function confirmPersp() {
  if (st.perspHandles.length < 4) return;
  const clean = st.history[st.history.length - 1];
  const tmpSrc = document.createElement('canvas');
  tmpSrc.width = canvas.width; tmpSrc.height = canvas.height;
  tmpSrc.getContext('2d').putImageData(clean, 0, 0);
  document.getElementById('loadingMsg').textContent = '透視矯正中...';
  document.getElementById('loadingOverlay').classList.add('show');
  await new Promise(r => setTimeout(r, 30));
  const result = perspWarp(tmpSrc, st.perspHandles);
  document.getElementById('loadingOverlay').classList.remove('show');
  if (!result) { showToast('矯正失敗，請重新選取四個角點', true); return; }
  canvas.width = result.width; canvas.height = result.height;
  ctx.drawImage(result, 0, 0);
  centerCanvas();
  st.history = []; saveHist();
  st.perspHandles = [];
  setTool('brush');
  showToast('透視矯正完成', true);
}

function rotate90() {
  const tmp = document.createElement('canvas');
  tmp.width = canvas.height; tmp.height = canvas.width;
  const tCtx = tmp.getContext('2d');
  tCtx.translate(tmp.width / 2, tmp.height / 2);
  tCtx.rotate(Math.PI / 2);
  tCtx.drawImage(canvas, -canvas.width / 2, -canvas.height / 2);
  canvas.width  = tmp.width;
  canvas.height = tmp.height;
  ctx.drawImage(tmp, 0, 0);
  centerCanvas();
  saveHist();
  if (st.tool === 'persp') {
    const pad = 20;
    st.perspHandles = [
      {x:pad, y:pad}, {x:canvas.width-pad, y:pad},
      {x:canvas.width-pad, y:canvas.height-pad}, {x:pad, y:canvas.height-pad},
    ];
    drawPerspOverlay();
  }
}

// ═══════════════════════════════════════════════
//  SAVE
// ═══════════════════════════════════════════════
function compressCanvas(cvs, maxBytes = 500 * 1024) {
  let q = 0.92;
  let url = cvs.toDataURL('image/jpeg', q);
  while (q > 0.3) {
    const byteLen = Math.round((url.length - 'data:image/jpeg;base64,'.length) * 3 / 4);
    if (byteLen <= maxBytes) break;
    q = Math.round((q - 0.1) * 10) / 10;
    url = cvs.toDataURL('image/jpeg', q);
  }
  return url;
}

async function saveAll() {
  const all = st.scanned;
  if (!all.length) return;
  if (navigator.share && navigator.canShare) {
    try {
      const files = await Promise.all(all.map(async (p, idx) => {
        const blob = await (await fetch(p.url)).blob();
        return new File([blob], `scan_${idx+1}.jpg`, {type:'image/jpeg'});
      }));
      if (navigator.canShare({files})) {
        await navigator.share({files, title:`全部 ${files.length} 張照片`});
        showToast('已存入照片，請查看相簿');
        return;
      }
    } catch(err) { if (err.name === 'AbortError') return; }
  }
  for (const [idx, p] of all.entries()) {
    const a = document.createElement('a');
    a.href = p.url; a.download = `scan_${idx+1}.jpg`; a.click();
    await new Promise(r => setTimeout(r, 300));
  }
  showToast(`已下載 ${all.length} 張 JPG`);
}

async function saveOnePhoto(url, fname) {
  const blob = await (await fetch(url)).blob();
  const file = new File([blob], fname, {type:'image/jpeg'});
  if (navigator.share && navigator.canShare?.({files:[file]})) {
    try {
      await navigator.share({files:[file], title:fname});
      showToast('已存入照片，請查看相簿', true);
    } catch(err) { if (err.name !== 'AbortError') fallbackDl(url, fname); }
  } else { fallbackDl(url, fname); }
}

function fallbackDl(url, name) {
  const a = document.createElement('a'); a.href = url; a.download = name; a.click();
  showToast(`已下載 ${name}`, st.currentTab !== 'export');
}

let toastT;
function showToast(msg, inEditor = false) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.className = 'toast' + (inEditor ? ' top' : '') + ' show';
  clearTimeout(toastT);
  toastT = setTimeout(() => el.classList.remove('show'), 2800);
}

// ═══════════════════════════════════════════════
//  INIT
// ═══════════════════════════════════════════════
setGreeting();
setInterval(setGreeting, 60 * 1000);
renderScan();
renderImport();
</script>
